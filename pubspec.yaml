name: mykayak
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  google_fonts: ^6.2.1
  go_router: ^17.1.0
  http: ^1.6.0
  intl: ^0.20.2
  objectbox: ^5.2.0
  objectbox_flutter_libs: any
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.2
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  fl_chart: ^1.2.0

dev_dependencies:
  build_runner: ^2.12.2
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  objectbox_generator: any
  riverpod_generator: ^4.0.3
  riverpod_lint: ^3.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#000044"
  adaptive_icon_foreground: "assets/logo.png"

flutter_native_splash:
  color: "#000044"
  image: "assets/logo.png"
  android: true
  ios: true
  android_12:
    color: "#000044"
    image: "assets/logo.png"