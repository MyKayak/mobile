  <circle cx="340" cy="340" r="130" fill="none" stroke="#8888DD" stroke-width="2.4" opacity="0.42"/>
  <circle cx="340" cy="340" r="175" fill="none" stroke="#8888DD" stroke-width="2.0" opacity="0.30"/>
  <circle cx="340" cy="340" r="224" fill="none" stroke="#8888DD" stroke-width="1.6" opacity="0.18"/>
  <circle cx="340" cy="340" r="278" fill="none" stroke="#8888DD" stroke-width="1.2" opacity="0.10"/>
  <circle cx="340" cy="340" r="336" fill="none" stroke="#8888DD" stroke-width="1.0" opacity="0.05"/>
  <circle cx="340" cy="340" r="400" fill="none" stroke="#8888DD" stroke-width="0.8" opacity="0.03"/>

  <g transform="rotate(45,340,340)" fill="url(#pg)">
